<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Facial</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 10px; }
        
        /* Conteneur circulaire style Smartphone / FaceID */
        .camera-container {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #00ff88;
            box-shadow: 0 0 20px #00ff88;
            background-color: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Effet miroir naturel */
        }
        
        /* Message d'instruction ou de compte à rebours */
        #status {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            height: 30px;
        }
        
        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #00ff88;
            color: #121212;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #00b35f; transform: scale(1.05); }
        button:disabled { background-color: #555; color: #aaa; cursor: not-allowed; }
        
        /* Canvas caché servant uniquement à capturer les images */
        canvas { display: none; }
    </style>
</head>
<body>

    <h1>Scanner d'Enrôlement</h1>
    
    <div class="camera-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div id="status">Caméra en cours de chargement...</div>
    
    <button id="btn-scan" disabled>Démarrer l'enregistrement</button>

    <!-- Éléments invisibles pour la capture technique -->
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        const btnScan = document.getElementById('btn-scan');
        const ctx = canvas.getContext('2d');

        let photosPrises = [];
        const TOTAL_PHOTOS = 5;

        // 1. Activer la Webcam au chargement de la page
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then(stream => {
                video.srcObject = stream;
                statusDiv.innerText = "Prêt pour le scan. Ajustez votre visage.";
                btnScan.disabled = false;
            })
            .catch(err => {
                statusDiv.innerText = "Erreur : Impossible d'accéder à la caméra.";
                console.error(err);
            });

        // 2. Déclencher le processus au clic
        btnScan.addEventListener('click', () => {
            btnScan.disabled = true;
            photosPrises = []; // Réinitialiser le tableau
            
            let compteALanvers = 3;
            statusDiv.innerText = `Attention, début dans ${compteALanvers}...`;

            // Petit compte à rebours avant la rafale
            const compteInterval = setInterval(() => {
                compteALanvers--;
                if (compteALanvers > 0) {
                    statusDiv.innerText = `Attention, début dans ${compteALanvers}...`;
                } else {
                    clearInterval(compteInterval);
                    lancerRafale();
                }
            }, 1000);
        });

        // 3. Gestion de la rafale automatique
        function lancerRafale() {
            let compteur = 0;
            statusDiv.innerText = "📸 Scan en cours... Bougez légèrement la tête !";

            const rafaleInterval = setInterval(() => {
                compteur++;
                
                // Dessiner l'image courante de la vidéo dans le canvas masqué
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Convertir l'image en format texte (Base64) lisible par Python
                const imageData = canvas.toDataURL('image/jpeg');
                photosPrises.push(imageData);

                statusDiv.innerText = `📸 Scan en cours... (${compteur}/${TOTAL_PHOTOS})`;

                if (compteur >= TOTAL_PHOTOS) {
                    clearInterval(rafaleInterval);
                    statusDiv.innerText = "✅ Scan terminé ! Envoi des données au serveur...";
                    envoyerAuServeur();
                }
            }, 500); // 500ms d'intervalle entre chaque photo (1 demi-seconde)
        }

        // 4. Envoi des images au Back-End
        function envoyerAuServeur() {
            const nomUtilisateur = prompt("Veuillez saisir votre prénom pour l'enregistrement :");
            
            if (!nomUtilisateur) {
                statusDiv.innerText = "❌ Enregistrement annulé (Nom manquant).";
                btnScan.disabled = false;
                return;
            }

            // Structure des données à envoyer
            const donneesAEnvoyer = {
                nom: nomUtilisateur,
                images: photosPrises
            };

            // Simulation d'envoi API (nous lierons cela à Flask à l'étape suivante)
            console.log("Données prêtes à être envoyées :", donneesAEnvoyer);
            
            // Pour l'instant, on simule une réponse positive du serveur Python
            setTimeout(() => {
                statusDiv.innerText = `🎉 Succès ! ${nomUtilisateur} est enregistré avec ${TOTAL_PHOTOS} angles !`;
                btnScan.disabled = false;
            }, 2000);
        }
    </script>
</body>
</html>
